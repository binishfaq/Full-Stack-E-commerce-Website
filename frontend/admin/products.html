<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseShop - Manage Products</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
    <style>
        /* Make category select scrollable */
        select[multiple] {
            height: auto;
            min-height: 200px;
        }
        
        /* Better option styling */
        select optgroup {
            font-weight: 600;
            color: var(--primary);
        }
        
        select option {
            padding: 5px 10px;
        }
        
        /* Optional: Add icons to options */
        .category-option {
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Ease<span>Shop</span></h2>
            <p>Admin Panel</p>
        </div>
        
        <div class="sidebar-menu">
            <div class="menu-title">MAIN</div>
            <a href="dashboard.html">
                <i class="fas fa-home"></i> <span>Dashboard</span>
            </a>
            <a href="products.html" class="active">
                <i class="fas fa-box"></i> <span>Products</span>
            </a>
            <a href="orders.html">
                <i class="fas fa-shopping-cart"></i> <span>Orders</span>
            </a>
            <a href="users.html">
                <i class="fas fa-users"></i> <span>Users</span>
            </a>
            
            <div class="menu-title">SYSTEM</div>
            <a href="#" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i> <span>Logout</span>
            </a>
        </div>
    </div>
    
    <!-- Main Content -->
    <div class="main-content">
        <div class="top-bar">
            <div class="page-title">
                <h1>Products Management</h1>
                <p>Add, edit, and manage products</p>
            </div>
            <div class="user-info">
                <span id="adminEmail"></span>
                <i class="fas fa-bell"></i>
                <i class="fas fa-user-circle"></i>
            </div>
        </div>
        
        <!-- Products Header -->
        <div class="card">
            <div class="card-header">
                <h2><i class="fas fa-box"></i> All Products</h2>
                <button class="btn btn-success" id="addProductBtn">
                    <i class="fas fa-plus"></i> Add New Product
                </button>
            </div>
            
            <!-- Search and Filter -->
            <div style="margin-bottom: 20px; display: flex; gap: 10px;">
                <input type="text" id="searchInput" class="form-control" 
                       placeholder="Search products..." style="max-width: 300px;">
                <select id="categoryFilter" class="form-control" style="max-width: 200px;">
                    <option value="">All Categories</option>
                    <option value="electronics">📱 Electronics</option>
                    <option value="clothing">👕 Clothing</option>
                    <option value="books">📚 Books</option>
                    <option value="sports">⚽ Sports</option>
                    <option value="furniture">🪑 Furniture</option>
                    <option value="beauty">💄 Beauty</option>
                    <option value="jewelry">💍 Jewelry</option>
                    <option value="toys">🧸 Toys</option>
                    <option value="groceries">🥑 Groceries</option>
                    <option value="automotive">🚗 Automotive</option>
                    <option value="pet">🐶 Pet Supplies</option>
                    <option value="office">📎 Office Supplies</option>
                </select>
                <button class="btn btn-primary" id="searchBtn">
                    <i class="fas fa-search"></i> Search
                </button>
            </div>
            
            <!-- Products Table -->
            <div class="table-responsive" id="productsContainer">
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Loading products...</p>
                </div>
            </div>
            
            <!-- Pagination -->
            <div id="pagination" style="margin-top: 20px; text-align: center;"></div>
        </div>
    </div>
    
    <!-- Add/Edit Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content" style="max-width: 700px;">
            <div class="modal-header">
                <h3 id="modalTitle">Add New Product</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            
            <form id="productForm">
                <input type="hidden" id="productId">
                
                <div class="form-group">
                    <label for="productName">Product Name *</label>
                    <input type="text" id="productName" class="form-control" placeholder="e.g., Sony WH-1000XM4" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="productBrand">Brand</label>
                        <input type="text" id="productBrand" class="form-control" placeholder="e.g., Sony, Nike, Apple">
                    </div>
                    
                    <div class="form-group">
                        <label for="productCategory">Category *</label>
                        <select id="productCategory" class="form-control" required>
                            <option value="">Select Category</option>
                            
                            <!-- Electronics & Tech -->
                            <optgroup label="📱 Electronics & Tech">
                                <option value="electronics">📱 Electronics</option>
                                <option value="phones">📱 Mobile Phones</option>
                                <option value="computers">💻 Computers</option>
                                <option value="tablets">📟 Tablets</option>
                                <option value="cameras">📸 Cameras</option>
                                <option value="audio">🎧 Audio</option>
                                <option value="wearables">⌚ Wearables</option>
                                <option value="accessories">🔌 Accessories</option>
                            </optgroup>
                            
                            <!-- Fashion -->
                            <optgroup label="👕 Fashion">
                                <option value="clothing">👕 Clothing</option>
                                <option value="men">👔 Men's Fashion</option>
                                <option value="women">👗 Women's Fashion</option>
                                <option value="kids">🧒 Kids' Fashion</option>
                                <option value="shoes">👟 Shoes</option>
                                <option value="watches">⌚ Watches</option>
                                <option value="jewelry">💍 Jewelry</option>
                                <option value="bags">👜 Bags</option>
                                <option value="sunglasses">🕶️ Sunglasses</option>
                            </optgroup>
                            
                            <!-- Home & Living -->
                            <optgroup label="🏠 Home & Living">
                                <option value="furniture">🪑 Furniture</option>
                                <option value="home">🏠 Home Decor</option>
                                <option value="kitchen">🍳 Kitchen</option>
                                <option value="garden">🌿 Garden</option>
                                <option value="lighting">💡 Lighting</option>
                                <option value="bath">🛁 Bath</option>
                                <option value="bedding">🛏️ Bedding</option>
                            </optgroup>
                            
                            <!-- Sports & Outdoors -->
                            <optgroup label="⚽ Sports & Outdoors">
                                <option value="sports">⚽ Sports</option>
                                <option value="gym">💪 Gym & Fitness</option>
                                <option value="camping">🏕️ Camping</option>
                                <option value="cycling">🚲 Cycling</option>
                                <option value="outdoor">🌲 Outdoor</option>
                            </optgroup>
                            
                            <!-- Books & Media -->
                            <optgroup label="📚 Books & Media">
                                <option value="books">📚 Books</option>
                                <option value="ebooks">📱 eBooks</option>
                                <option value="audiobooks">🎧 Audiobooks</option>
                                <option value="magazines">📰 Magazines</option>
                                <option value="music">🎵 Music</option>
                                <option value="movies">🎬 Movies</option>
                                <option value="gaming">🎮 Gaming</option>
                            </optgroup>
                            
                            <!-- Beauty & Health -->
                            <optgroup label="💄 Beauty & Health">
                                <option value="beauty">💄 Beauty</option>
                                <option value="skincare">🧴 Skincare</option>
                                <option value="makeup">💋 Makeup</option>
                                <option value="fragrance">🌸 Fragrance</option>
                                <option value="health">💊 Health</option>
                                <option value="wellness">🧘 Wellness</option>
                                <option value="personal-care">🚿 Personal Care</option>
                            </optgroup>
                            
                            <!-- Groceries & Essentials -->
                            <optgroup label="🥑 Groceries & Essentials">
                                <option value="groceries">🥑 Groceries</option>
                                <option value="beverages">🥤 Beverages</option>
                                <option value="snacks">🍪 Snacks</option>
                                <option value="organic">🌱 Organic</option>
                            </optgroup>
                            
                            <!-- Automotive -->
                            <optgroup label="🚗 Automotive">
                                <option value="automotive">🚗 Automotive</option>
                                <option value="car-parts">🔧 Car Parts</option>
                                <option value="car-accessories">🎨 Car Accessories</option>
                                <option value="motorcycle">🏍️ Motorcycle</option>
                            </optgroup>
                            
                            <!-- Kids & Baby -->
                            <optgroup label="🧸 Kids & Baby">
                                <option value="baby">🍼 Baby Products</option>
                                <option value="toys">🧸 Toys</option>
                                <option value="kids-furniture">🪑 Kids Furniture</option>
                            </optgroup>
                            
                            <!-- Pet Supplies -->
                            <optgroup label="🐶 Pet Supplies">
                                <option value="pet">🐶 Pet Supplies</option>
                                <option value="dog">🐕 Dogs</option>
                                <option value="cat">🐈 Cats</option>
                                <option value="fish">🐠 Fish</option>
                                <option value="bird">🦜 Birds</option>
                            </optgroup>
                            
                            <!-- Office & Stationery -->
                            <optgroup label="📎 Office & Stationery">
                                <option value="office">📎 Office Supplies</option>
                                <option value="stationery">✏️ Stationery</option>
                                <option value="art">🎨 Art Supplies</option>
                            </optgroup>
                            
                            <!-- Special Categories -->
                            <optgroup label="🎁 Special Categories">
                                <option value="handmade">🤲 Handmade</option>
                                <option value="eco-friendly">🌿 Eco-Friendly</option>
                                <option value="vintage">📻 Vintage</option>
                                <option value="collectibles">🏆 Collectibles</option>
                                <option value="gift-cards">🎁 Gift Cards</option>
                            </optgroup>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="productDescription">Description</label>
                    <textarea id="productDescription" class="form-control" rows="3" 
                              placeholder="Product description, features, specifications..."></textarea>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="productPrice">Price (₹) *</label>
                        <input type="number" id="productPrice" class="form-control" 
                               placeholder="e.g., 24999" min="0" step="0.01" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="productStock">Stock *</label>
                        <input type="number" id="productStock" class="form-control" 
                               placeholder="e.g., 100" min="0" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="productImage">Image URL</label>
                    <input type="url" id="productImage" class="form-control" 
                           placeholder="https://example.com/image.jpg">
                </div>
                
                <div style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button type="button" class="btn btn-warning" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-success" id="saveProductBtn">Save Product</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="js/products.js"></script>
</body>
</html>
